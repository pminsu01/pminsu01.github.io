---
layout: default
---
 <!-- main post view-->

<div class="post-layout-title">
<center>
	<h1 class="post-title">
		{{ page.title }}
	</h1>
	
	<h3 class="post-subtitle">
		{{page.subtitle}}
	</h3>

	 <small>by 주에르 &middot; {{ page.date | date: "%b %-d, %Y" }}</small>
</center>
</div>

<div class="main-post">
<br />
		{{ content }}
</div>
